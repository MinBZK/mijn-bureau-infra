application:
  ollama:
    enabled: false

pvc:
  default:
    storageClass: "test-propagation-storage"
    size: "42Gi"
    accessModes:
      - ReadWriteOnce
      - ReadOnlyMany
  # ClamAV has an explicit pvc.clamav.size set in pvc.yaml.gotmpl,
  # which takes priority over pvc.default.size in the coalesce chain.
  # Override it here to match the test's expected value.
  clamav:
    size: "42Gi"
