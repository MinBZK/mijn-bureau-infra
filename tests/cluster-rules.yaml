application:
  ollama:
    enabled: false

global:
  domain: "mijnbureau.nl"
  resourcesPresetPerApp:
    collabora: "small"
    elementweb: "nano"
    keycloak: "small"
    ollama: "small"
    synapse: "small"
    grist: "small"
    livekit: "small"
    nextcloud: "small"
    meet:
      backend: "small"
      frontend: "small"
    docs:
      backend: "small"
      frontend: "small"
      celery: "small"
      yProvider: "small"
      docspec: "small"
    drive:
      backend: "small"
      frontend: "small"
    conversations:
      backend: "small"
      frontend: "small"
    bureaublad:
      backend: "small"
      frontend: "small"

cluster:
  ingress:
    type: nginx
    className: "test-ingress-class"
    annotations:
      custom.annotation/test: "test-value"
      custom.annotation/environment: "testing"
  certificate:
    issuerRef:
      name: "test-cert-issuer"
      kind: "ClusterIssuer"
  runtimeClassName: "test-runtime-class"
