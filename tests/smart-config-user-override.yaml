application:
  keycloak:
    enabled: true
    namespace: test-namespace
  ollama:
    enabled: true
    namespace: test-namespace
    model: "llama3.2"
  # conversations consumes both authentication.oidc.* and ai.llm.*,
  # so enabling it exercises the user-provided values end to end
  conversations:
    enabled: true
    namespace: test-namespace

global:
  domain: "test-override.example"
  resourcesPresetPerApp:
    collabora: "small"
    elementweb: "nano"
    keycloak: "small"
    ollama: "small"
    synapse: "small"
    grist: "small"
    livekit: "small"
    nextcloud: "small"
    meet:
      backend: "small"
      frontend: "small"
    docs:
      backend: "small"
      frontend: "small"
      celery: "small"
      yProvider: "small"
      docspec: "small"
    drive:
      backend: "small"
      frontend: "small"
    conversations:
      backend: "small"
      frontend: "small"
    bureaublad:
      backend: "small"
      frontend: "small"
  hostname:
    keycloak: "id-test"

# Test environment with CUSTOM authentication and AI values
# Smart logic should NOT override these user-provided values
authentication:
  oidc:
    issuer: "https://custom-auth.example.com/realms/custom"
    authorization_endpoint: "https://custom-auth.example.com/auth"
    token_endpoint: "https://custom-auth.example.com/token"
    introspection_endpoint: "https://custom-auth.example.com/introspect"
    userinfo_endpoint: "https://custom-auth.example.com/userinfo"
    end_session_endpoint: "https://custom-auth.example.com/logout"
    jwks_uri: "https://custom-auth.example.com/certs"

ai:
  llm:
    model: "custom-model"
    endpoint:
      host: "custom-ai.example.com"
      port: 443
      openApiVersion: "v1"
      isSsl: true
      isInternal: false
    apiKey: "custom-api-key"
