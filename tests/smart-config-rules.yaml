application:
  keycloak:
    enabled: true
    namespace: test-namespace
  ollama:
    enabled: true
    namespace: test-namespace
    model: "llama3.2"

global:
  domain: "test-smart-config.example"
  resourcesPresetPerApp:
    collabora: "small"
    elementweb: "nano"
    keycloak: "small"
    ollama: "small"
    synapse: "small"
    grist: "small"
    livekit: "small"
    nextcloud: "small"
    meet:
      backend: "small"
      frontend: "small"
    docs:
      backend: "small"
      frontend: "small"
      celery: "small"
      yProvider: "small"
      docspec: "small"
    drive:
      backend: "small"
      frontend: "small"
    conversations:
      backend: "small"
      frontend: "small"
    bureaublad:
      backend: "small"
      frontend: "small"
  hostname:
    keycloak: "id-test"

# Test environment with empty authentication and AI values
# Smart logic should auto-populate these when services are enabled
authentication:
  oidc:
    issuer: ~
    authorization_endpoint: ~
    token_endpoint: ~
    introspection_endpoint: ~
    userinfo_endpoint: ~
    end_session_endpoint: ~
    jwks_uri: ~

ai:
  llm:
    model: ~
    endpoint:
      host: ~
      port: ~
      openApiVersion: "v1"
      isSsl: true
      isInternal: false
    apiKey: ~
