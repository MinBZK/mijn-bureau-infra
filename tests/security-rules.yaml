global:
  resourcesPresetPerApp:
    collabora: "small"
    elementweb: "nano"
    keycloak: "small"
    ollama: "small"
    synapse: "small"
    grist: "small"
    livekit: "small"
    nextcloud: "small"
    meet:
      backend: "small"
      frontend: "small"
    docs:
      backend: "small"
      frontend: "small"
      celery: "small"
      yProvider: "small"
      docspec: "small"
    drive:
      backend: "small"
      frontend: "small"
    conversations:
      backend: "small"
      frontend: "small"
    bureaublad:
      backend: "small"
      frontend: "small"

security:
  default:
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      privileged: false
      runAsUser: 9999
      runAsGroup: 8888
      readOnlyRootFilesystem: true
      runAsNonRoot: true

    podSecurityContext:
      enabled: true
      fsGroupChangePolicy: TestingPropagation
      sysctls: []
      supplementalGroups: []
      fsGroup: 7777

  collabora:
    containerSecurityContext:
      enabled: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 9999
      runAsGroup: 8888

    podSecurityContext:
      enabled: true
      fsGroup: 7777
      fsGroupChangePolicy: "TestingPropagation"
