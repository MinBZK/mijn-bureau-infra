# Source: drive/templates/backend_celery_beat.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drive-release-backend-celery-beat
  namespace: "icbr-poc-berry"
  annotations:
  labels:
    helm.sh/chart: drive-0.7.0
    app.kubernetes.io/name: drive
    app.kubernetes.io/instance: drive-release
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backend-celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: drive
      app.kubernetes.io/instance: drive-release
      app.kubernetes.io/component: backend-celery-beat
  template:
    metadata:
      annotations:
      labels:
        app.kubernetes.io/name: drive
        app.kubernetes.io/instance: drive-release
        app.kubernetes.io/component: backend-celery-beat
    spec:
      shareProcessNamespace: false
      containers:
        - name: drive
          image: "lasuite/drive-backend:latest"
          imagePullPolicy: IfNotPresent
          args:
            - celery
            - -A
            - drive.celery_app
            - beat
            - -l
            - INFO
          env:
          livenessProbe:
            exec:
              command:
              - /bin/sh
              - -c
              - celery -A drive.celery_app inspect ping
            initialDelaySeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
              - /bin/sh
              - -c
              - celery -A drive.celery_app inspect ping
            initialDelaySeconds: 15
            timeoutSeconds: 5
          volumeMounts:
      volumes:
