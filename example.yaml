apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drive-release-media
  namespace: "icbr-poc-berry"
  labels:
    helm.sh/chart: drive-0.7.0
    app.kubernetes.io/name: drive
    app.kubernetes.io/instance: drive-release
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
  annotations:
    nginx.ingress.kubernetes.io/auth-response-headers: Authorization, X-Amz-Date, X-Amz-Content-SHA256
    nginx.ingress.kubernetes.io/auth-url: https://drive.example.com/api/v1.0/items/media-auth/
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Content-Security-Policy "default-src 'none'" always;
      add_header Content-Disposition "attachment";
    nginx.ingress.kubernetes.io/upstream-vhost: minio.drive.svc.cluster.local:9000
spec:
  tls:
    - secretName: "drive-release-tls"
      hosts:
        - "drive.example.com"
  rules:
    - host: "drive.example.com"
      http:
        paths:
          - path: "/media/(.*)"
            pathType: ImplementationSpecific
            backend:
              service:
                name: drive-release-media
                port:
                  number: 9000
