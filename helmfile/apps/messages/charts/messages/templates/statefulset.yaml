apiVersion: {{ include "common.capabilities.statefulset.apiVersion" . }}
kind: StatefulSet
metadata:
  name: {{ template "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: messages
  {{- if or .Values.messages.statefulsetAnnotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" (dict "values" (list .Values.messages.statefulsetAnnotations .Values.commonAnnotations) "context" .) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.messages.autoscaling.hpa.enabled }}
  replicas: {{ .Values.messages.replicaCount }}
  {{- end }}
  podManagementPolicy: {{ .Values.podManagementPolicy | quote }}
  {{- $podLabels := include "common.tplvalues.merge" (dict "values" (list .Values.messages.podLabels .Values.commonLabels) "context" .) }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" ( dict "customLabels" $podLabels "context" $ ) | nindent 6 }}
      app.kubernetes.io/component: messages
  serviceName: {{ template "common.names.fullname" . }}
  {{- if .Values.messages.updateStrategy }}
  updateStrategy: {{- toYaml .Values.messages.updateStrategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      {{- if .Values.messages.podAnnotations }}
      annotations: {{- include "common.tplvalues.render" (dict "value" .Values.messages.podAnnotations "context" $) | nindent 8 }}
      {{- end }}
      labels: {{- include "common.labels.standard" ( dict "customLabels" $podLabels "context" $ ) | nindent 8 }}
        app.kubernetes.io/component: messages
    spec:
      {{- include "messages.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ template "messages.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.messages.automountServiceAccountToken }}
      {{- if .Values.messages.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.messages.hostAliases "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.messages.affinity }}
      affinity: {{- include "common.tplvalues.render" ( dict "value" .Values.messages.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.messages.podAffinityPreset "component" "messages" "customLabels" $podLabels "context" $) | nindent 10 }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.messages.podAntiAffinityPreset "component" "messages" "customLabels" $podLabels "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.messages.nodeAffinityPreset.type "key" .Values.messages.nodeAffinityPreset.key "values" .Values.messages.nodeAffinityPreset.values) | nindent 10 }}
      {{- end }}
      {{- if .Values.messages.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" ( dict "value" .Values.messages.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.messages.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.messages.tolerations "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.messages.priorityClassName }}
      priorityClassName: {{ .Values.messages.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.messages.schedulerName }}
      schedulerName: {{ .Values.messages.schedulerName | quote }}
      {{- end }}
      {{- if .Values.messages.runtimeClassName }}
      runtimeClassName: {{ .Values.messages.runtimeClassName | quote }}
      {{- end }}
      {{- if .Values.messages.topologySpreadConstraints }}
      topologySpreadConstraints: {{- include "common.tplvalues.render" (dict "value" .Values.messages.topologySpreadConstraints "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.messages.podSecurityContext.enabled }}
      securityContext: {{- omit .Values.messages.podSecurityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.messages.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.messages.terminationGracePeriodSeconds }}
      {{- end }}
      initContainers:
        {{- if and .Values.defaultInitContainers.volumePermissions.enabled .Values.persistence.enabled }}
        {{- include "messages.defaultInitContainers.volumePermissions" (dict "context" . "component" "messages") | nindent 8 }}
        {{- end }}
        {{- if .Values.messages.initContainers }}
          {{- include "common.tplvalues.render" (dict "value" .Values.messages.initContainers "context" $) | nindent 8 }}
        {{- end }}
      containers:
        - name: %%CONTAINER_NAME%%
          image: {{ template "messages.image" . }}
          imagePullPolicy: {{ .Values.messages.image.pullPolicy }}
          {{- if .Values.messages.containerSecurityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.messages.containerSecurityContext "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.command "context" $) | nindent 12 }}
          {{- else if .Values.messages.command }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.messages.command "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.args "context" $) | nindent 12 }}
          {{- else if .Values.messages.args }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.messages.args "context" $) | nindent 12 }}
          {{- end }}
          env:
            - name: BITNAMI_DEBUG
              value: {{ ternary "true" "false" (or .Values.image.debug .Values.diagnosticMode.enabled) | quote }}
            - name: foo
              value: bar
            {{- if .Values.messages.extraEnvVars }}
            {{- include "common.tplvalues.render" (dict "value" .Values.messages.extraEnvVars "context" $) | nindent 12 }}
            {{- end }}
          envFrom:
            {{- if .Values.messages.extraEnvVarsCM }}
            - configMapRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.messages.extraEnvVarsCM "context" $) }}
            {{- end }}
            {{- if .Values.messages.extraEnvVarsSecret }}
            - secretRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.messages.extraEnvVarsSecret "context" $) }}
            {{- end }}
          {{- if .Values.messages.resources }}
          resources: {{- toYaml .Values.messages.resources | nindent 12 }}
          {{- else if ne .Values.messages.resourcesPreset "none" }}
          resources: {{- include "common.resources.preset" (dict "type" .Values.messages.resourcesPreset) | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.messages.containerPorts.http }}
            - name: https
              containerPort: {{ .Values.messages.containerPorts.https }}
            {{- if .Values.messages.extraContainerPorts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.messages.extraContainerPorts "context" $) | nindent 12 }}
            {{- end }}
          {{- if not .Values.diagnosticMode.enabled }}
          {{- if .Values.messages.customLivenessProbe }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.messages.customLivenessProbe "context" $) | nindent 12 }}
          {{- else if .Values.messages.livenessProbe.enabled }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.messages.livenessProbe "enabled") "context" $) | nindent 12 }}
            %%httpGet || command || etc%%
          {{- end }}
          {{- if .Values.messages.customReadinessProbe }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.messages.customReadinessProbe "context" $) | nindent 12 }}
          {{- else if .Values.messages.readinessProbe.enabled }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.messages.readinessProbe "enabled") "context" $) | nindent 12 }}
            %%httpGet || command || etc%%
          {{- end }}
          {{- if .Values.messages.customStartupProbe }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.messages.customStartupProbe "context" $) | nindent 12 }}
          {{- else if .Values.messages.startupProbe.enabled }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.messages.startupProbe "enabled") "context" $) | nindent 12 }}
            %%httpGet || command || etc%%
          {{- end }}
          {{- end }}
          {{- if .Values.messages.lifecycleHooks }}
          lifecycle: {{- include "common.tplvalues.render" (dict "value" .Values.messages.lifecycleHooks "context" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
              readOnly: true
            - name: empty-dir
              mountPath: /tmp
              subPath: tmp-dir
          {{- if .Values.messages.extraVolumeMounts }}
          {{- include "common.tplvalues.render" (dict "value" .Values.messages.extraVolumeMounts "context" $) | nindent 12 }}
          {{- end }}
        {{- if .Values.messages.sidecars }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.messages.sidecars "context" $) | nindent 8 }}
        {{- end }}
      volumes:
        - name: empty-dir
          emptyDir: {}
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "common.names.fullname" .) .Values.persistence.existingClaim }}
        {{- else }}
          emptyDir: {}
        {{- end }}
        {{- if .Values.messages.extraVolumes }}
        {{- include "common.tplvalues.render" (dict "value" .Values.messages.extraVolumes "context" $) | nindent 8 }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- if or .Values.persistence.annotations .Values.commonAnnotations }}
        {{- $claimAnnotations := include "common.tplvalues.merge" (dict "values" .Values.persistence.annotations .Values.commonAnnotations "context" .) | fromYaml }}
        annotations: {{- include "common.tplvalues.render" ( dict "value" $claimAnnotations "context" $ ) | nindent 10 }}
        {{- end }}
        {{- if .Values.commonLabels }}
        labels: {{- include "common.labels.matchLabels" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
        {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- if .Values.persistence.dataSource }}
        dataSource: {{- include "common.tplvalues.render" (dict "value" .Values.persistence.dataSource "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.persistence.selector }}
        selector: {{- include "common.tplvalues.render" (dict "value" .Values.persistence.selector "context" $) | nindent 10 }}
        {{- end }}
        {{- include "common.storage.class" (dict "persistence" .Values.persistence "global" .Values.global) | nindent 8 }}
  {{- end }}
