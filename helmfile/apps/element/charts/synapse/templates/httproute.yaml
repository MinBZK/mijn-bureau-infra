{{- if eq .Values.cluster.routingMode "gateway-api" }}
{{- $fullName := include "common.names.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: synapse
  {{- include "common.httproute.annotations" . | nindent 2 }}
spec:
  parentRefs:
    {{- include "common.httproute.parentRef" .Values.cluster.gateway | nindent 4 }}
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /_matrix
      filters:
        {{- include "common.httproute.hstsFilter" . | nindent 8 }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.master.service.ports.http }}
    {{- if .Values.synapse.serveServerWellknown }}
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known
      filters:
        {{- include "common.httproute.hstsFilter" . | nindent 8 }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.master.service.ports.http }}
    {{- end }}
    {{- if .Values.ingress.includeSynapseAdminApis }}
    - matches:
        - path:
            type: PathPrefix
            value: /_synapse
      filters:
        {{- include "common.httproute.hstsFilter" . | nindent 8 }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.master.service.ports.http }}
    {{- end }}
{{- end }}
