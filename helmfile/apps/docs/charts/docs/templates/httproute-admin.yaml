{{- if eq .Values.cluster.routingMode "gateway-api" }}
{{- if .Values.ingressAdmin.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "docs.backend.fullname" . }}-admin
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- include "common.httproute.annotations" . | nindent 2 }}
spec:
  parentRefs:
    {{- include "common.httproute.parentRef" .Values.cluster.gateway | nindent 4 }}
  hostnames:
    - {{ .Values.ingressAdmin.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingressAdmin.adminPath | default "/admin" | quote }}
      filters:
        {{- include "common.httproute.hstsFilter" . | nindent 8 }}
      backendRefs:
        - name: {{ include "docs.backend.fullname" . }}
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingressAdmin.staticPath | default "/static" | quote }}
      filters:
        {{- include "common.httproute.hstsFilter" . | nindent 8 }}
      backendRefs:
        - name: {{ include "docs.backend.fullname" . }}
          port: 80
{{- end }}
{{- end }}
