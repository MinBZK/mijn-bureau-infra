name: "Update opensearch container tags"

scms:
  default:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      owner: "{{ .github.owner }}"
      repository: "{{ .github.repository }}"
      username: "{{ .github.username }}"
      branch: "{{ .github.branch }}"
      commitmessage:
        title: Bump opensearch version to {{ source "opensearch_latest_version" }}
        hidecredit: true
        squash: true
        type: "⬆️(deps)"

sources:
  opensearch_latest_version:
    name: "Get latest opensearch tag"
    kind: dockerimage
    spec:
      image: "bitnamilegacy/opensearch"
      architecture: amd64
      tagfilter: "^[0-9.]+-debian-[0-9]+-r[0-9]+$"
      versionfilter:
        kind: regex/semver
        regex: "([0-9]+\\.[0-9]+\\.[0-9]+)-debian-[0-9]+-r[0-9]+"
        pattern: ">0.0.0"

targets:
  update_opensearch_tag:
    name: "Update Keycloak tag"
    kind: yaml
    spec:
      engine: yamlpath
      file: "helmfile/environments/default/container.yaml.gotmpl"
      key: "$.container.opensearch.tag"
    sourceid: opensearch_latest_version
    scmid: default

actions:
  default:
    scmid: default
    kind: github/pullrequest
    title: ⬆️(deps) Bump opensearch version to {{ source "opensearch_latest_version" }}
